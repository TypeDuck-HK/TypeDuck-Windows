syntax = "proto3";

package moqi.protocol;

option go_package = "github.com/gaboolic/moqi-ime/proto;moqipb";

enum Method {
  METHOD_UNSPECIFIED = 0;
  METHOD_INIT = 1;
  METHOD_CLOSE = 2;
  METHOD_ON_ACTIVATE = 3;
  METHOD_ON_DEACTIVATE = 4;
  METHOD_FILTER_KEY_DOWN = 5;
  METHOD_ON_KEY_DOWN = 6;
  METHOD_FILTER_KEY_UP = 7;
  METHOD_ON_KEY_UP = 8;
  METHOD_ON_PRESERVED_KEY = 9;
  METHOD_ON_COMMAND = 10;
  METHOD_ON_MENU = 11;
  METHOD_ON_COMPARTMENT_CHANGED = 12;
  METHOD_ON_KEYBOARD_STATUS_CHANGED = 13;
  METHOD_ON_COMPOSITION_TERMINATED = 14;
  METHOD_ON_LANG_PROFILE_ACTIVATED = 15;
  METHOD_HIGHLIGHT_CANDIDATE = 16;
  METHOD_SELECT_CANDIDATE = 17;
  METHOD_CHANGE_PAGE = 18;
  METHOD_CLOUD_CLIPBOARD_UPLOAD = 19;
  METHOD_TYPEDUCK_SETTINGS_SNAPSHOT = 100;
  METHOD_TYPEDUCK_SETTINGS_UPDATE = 101;
  METHOD_TYPEDUCK_DEPLOY = 102;
  METHOD_TYPEDUCK_RECONFIGURE = 103;
  METHOD_TYPEDUCK_HEALTH = 104;
}

enum ButtonType {
  BUTTON_TYPE_UNSPECIFIED = 0;
  BUTTON_TYPE_BUTTON = 1;
  BUTTON_TYPE_TOGGLE = 2;
  BUTTON_TYPE_MENU = 3;
}

message KeyEvent {
  uint32 char_code = 1;
  uint32 key_code = 2;
  uint32 repeat_count = 3;
  uint32 scan_code = 4;
  bool is_extended = 5;
  repeated uint32 key_states = 6;
}

message ButtonInfo {
  string id = 1;
  string icon = 2;
  string text = 3;
  string tooltip = 4;
  uint32 command_id = 5;
  ButtonType type = 6;
  bool enable = 7;
  bool toggled = 8;
  optional uint32 style = 9;
}

message MenuItem {
  uint32 id = 1;
  string text = 2;
  bool checked = 3;
  bool enabled = 4;
  repeated MenuItem submenu = 5;
  bool separator = 6;
}

message PreservedKey {
  uint32 key_code = 1;
  uint32 modifiers = 2;
  string guid = 3;
}

message CandidateEntry {
  string text = 1;
  string comment = 2;
  string id = 3;
  string input_code = 4;
  string jyutping = 5;
  string raw_lookup_comment = 6;
  repeated string translations = 7;
  repeated string prompts = 8;
  optional uint32 source_index = 9;
  optional bool selectable = 10;
}

message TypeDuckCandidatePage {
  uint32 page_index = 1;
  uint32 page_size = 2;
  uint32 total_count = 3;
  bool has_previous = 4;
  bool has_next = 5;
}

message TypeDuckProtocolInfo {
  // TYPEDUCK_PROTOCOL_VERSION is the canonical Phase 4 TypeDuck protocol version token.
  // TYPE_DUCK_PROTOCOL_VERSION documents the compatibility bridge spelling used in planning.
  uint32 version = 1;
  string product = 2;
  string compatibility_bridge = 3;
}

message TypeDuckSettingsSnapshot {
  string language = 1;
  string schema_id = 2;
  string display_language = 3;
  bool ascii_mode = 4;
  bool traditional_hong_kong = 5;
  uint32 candidate_page_size = 6;
  repeated string display_languages = 20;
  string main_language = 21;
  uint32 page_size = 22;
  bool is_hei_typeface = 23;
  string show_romanization = 24;
  bool enable_completion = 25;
  bool enable_correction = 26;
  bool enable_sentence = 27;
  bool enable_learning = 28;
  bool show_reverse_code = 29;
  bool is_cangjie5 = 30;
  string source = 31;
  string status_message = 32;
}

message TypeDuckSettingsUpdate {
  optional string language = 1;
  optional string schema_id = 2;
  optional string display_language = 3;
  optional bool ascii_mode = 4;
  optional bool traditional_hong_kong = 5;
  optional uint32 candidate_page_size = 6;
  repeated string display_languages = 20;
  optional string main_language = 21;
  optional uint32 page_size = 22;
  optional bool is_hei_typeface = 23;
  optional string show_romanization = 24;
  optional bool enable_completion = 25;
  optional bool enable_correction = 26;
  optional bool enable_sentence = 27;
  optional bool enable_learning = 28;
  optional bool show_reverse_code = 29;
  optional bool is_cangjie5 = 30;
}

message TypeDuckEngineCapability {
  string name = 1;
  bool supported = 2;
  string version = 3;
  string detail = 4;
}

message TypeDuckDeployRequest {
  string runtime_path = 1;
  string schema_id = 2;
  bool force = 3;
}

message TypeDuckReconfigureRequest {
  string schema_id = 1;
  bool reload_user_dict = 2;
  bool restart_backend = 3;
}

enum TypeDuckHealthStatus {
  TYPEDUCK_HEALTH_STATUS_UNSPECIFIED = 0;
  TYPEDUCK_HEALTH_OK = 1;
  TYPEDUCK_HEALTH_DEGRADED = 2;
  TYPEDUCK_HEALTH_RESTARTING = 3;
  TYPEDUCK_HEALTH_FAILED = 4;
}

message TypeDuckEngineHealth {
  TypeDuckHealthStatus status = 1;
  string backend_name = 2;
  string message = 3;
  bool recoverable = 4;
  uint32 restart_count = 5;
}

enum TypeDuckErrorCode {
  TYPEDUCK_ERROR_UNSPECIFIED = 0;
  TYPEDUCK_ERROR_MALFORMED_FRAME = 1;
  TYPEDUCK_ERROR_PAYLOAD_TOO_LARGE = 2;
  TYPEDUCK_ERROR_MALFORMED_PAYLOAD = 3;
  TYPEDUCK_ERROR_BACKEND_TIMEOUT = 4;
  TYPEDUCK_ERROR_BACKEND_RESTART = 5;
  TYPEDUCK_ERROR_ENGINE_INIT_FAILED = 6;
  TYPEDUCK_ERROR_SETTINGS_APPLY_FAILED = 7;
}

message TypeDuckError {
  TypeDuckErrorCode code = 1;
  string message = 2;
  bool recoverable = 3;
  string detail = 4;
}

message AutoPairRule {
  string open = 1;
  string close = 2;
}

message CustomizeUi {
  optional string cand_font_name = 1;
  optional uint32 cand_font_size = 2;
  optional uint32 cand_per_row = 3;
  optional bool cand_use_cursor = 4;
  optional bool inline_preedit = 5;
  optional string cand_background_color = 6;
  optional string cand_highlight_color = 7;
  optional string cand_text_color = 8;
  optional string cand_highlight_text_color = 9;
  optional uint32 cand_comment_font_size = 10;
  optional bool auto_pair_quotes = 11;
  optional bool semicolon_select_second = 12;
  optional string cand_comment_font_name = 13;
  optional string cand_comment_color = 14;
  optional string cand_comment_highlight_color = 15;
  repeated AutoPairRule auto_pair_rules = 16;
  optional uint32 cand_spacing = 17;
}

message MessageWindow {
  string message = 1;
  int32 duration = 2;
}

enum TrayNotificationIcon {
  TRAY_NOTIFICATION_ICON_UNSPECIFIED = 0;
  TRAY_NOTIFICATION_ICON_INFO = 1;
  TRAY_NOTIFICATION_ICON_WARNING = 2;
  TRAY_NOTIFICATION_ICON_ERROR = 3;
}

message TrayNotification {
  string title = 1;
  string message = 2;
  TrayNotificationIcon icon = 3;
}

message ClientRequest {
  reserved 100;
  uint32 seq_num = 1;
  Method method = 2;
  optional string guid = 3;
  bool is_windows8_above = 4;
  bool is_metro_app = 5;
  bool is_ui_less = 6;
  bool is_console = 7;
  bool opened = 8;
  bool forced = 9;
  uint32 command_type = 10;
  KeyEvent key_event = 11;
  string composition_string = 12;
  repeated string candidate_list = 13;
  bool show_candidates = 14;
  int32 cursor_pos = 15;
  int32 sel_start = 16;
  int32 sel_end = 17;
  optional string button_id = 18;
  optional uint32 command_id = 19;
  optional string preserved_key_guid = 20;
  optional string compartment_guid = 21;
  bool is_keyboard_open = 22;
  optional string client_id = 23;
  optional int32 candidate_index = 24;
  optional bool page_backward = 25;
  optional string cloud_clipboard_text = 26;
  optional TypeDuckProtocolInfo typeduck_protocol = 27;
  optional TypeDuckSettingsSnapshot typeduck_settings_snapshot = 28;
  optional TypeDuckSettingsUpdate typeduck_settings_update = 29;
  optional TypeDuckDeployRequest typeduck_deploy_request = 30;
  optional TypeDuckReconfigureRequest typeduck_reconfigure_request = 31;
}

message ServerResponse {
  reserved 100;
  optional string client_id = 1;
  uint32 seq_num = 2;
  bool success = 3;
  int32 return_value = 4;
  repeated MenuItem menu_items = 5;
  string composition_string = 6;
  string commit_string = 7;
  repeated string candidate_list = 8;
  bool show_candidates = 9;
  int32 cursor_pos = 10;
  int32 composition_cursor = 11;
  optional int32 candidate_cursor = 12;
  int32 sel_start = 13;
  int32 sel_end = 14;
  string set_sel_keys = 15;
  optional CustomizeUi customize_ui = 16;
  repeated ButtonInfo add_button = 17;
  repeated string remove_button = 18;
  repeated ButtonInfo change_button = 19;
  optional MessageWindow show_message = 20;
  bool hide_message = 21;
  bool open_keyboard = 22;
  repeated PreservedKey add_preserved_key = 23;
  repeated string remove_preserved_key = 24;
  string error = 25;
  optional TrayNotification tray_notification = 26;
  repeated CandidateEntry candidate_entries = 27;
  optional TypeDuckProtocolInfo typeduck_protocol = 28;
  optional TypeDuckCandidatePage typeduck_candidate_page = 29;
  optional TypeDuckSettingsSnapshot typeduck_settings_snapshot = 30;
  optional TypeDuckSettingsUpdate typeduck_settings_update = 31;
  repeated TypeDuckEngineCapability typeduck_capabilities = 32;
  optional TypeDuckEngineHealth typeduck_engine_health = 33;
  optional TypeDuckError typeduck_error = 34;
}
