name: Nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-main
  cancel-in-progress: true

env:
  PROTOBUF_VERSION: "33.5"

jobs:
  build-nightly:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout TypeDuck-Windows
        uses: actions/checkout@v4
        with:
          path: TypeDuck-Windows
          submodules: recursive
          fetch-depth: 0

      - name: Checkout TypeDuck-Windows-backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/TypeDuck-Windows-backend
          path: TypeDuck-Windows-backend
          submodules: recursive
          fetch-depth: 0

      - name: Checkout TypeDuck schema aap2-alpha
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/schema
          ref: aap2-alpha
          path: TypeDuck-HK-schema
          fetch-depth: 1

      - name: Apply TypeDuck submodule patches
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\Apply-TypeDuckSubmodulePatches.ps1 -RepoRoot .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.6"
          cache-dependency-path: TypeDuck-Windows-backend/go.sum

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Download protoc
        run: |
          $protocRoot = Join-Path $env:RUNNER_TEMP "protoc-$env:PROTOBUF_VERSION-win64"
          $zipPath = Join-Path $env:RUNNER_TEMP "protoc-$env:PROTOBUF_VERSION-win64.zip"

          if (Test-Path -LiteralPath $protocRoot) {
            Remove-Item -LiteralPath $protocRoot -Recurse -Force
          }

          Invoke-WebRequest `
            -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOBUF_VERSION/protoc-$env:PROTOBUF_VERSION-win64.zip" `
            -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $protocRoot -Force

          "PROTOBUF_ROOT=$protocRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare TypeDuck schema runtime build
        run: |
          $schemaSource = Join-Path $env:GITHUB_WORKSPACE "TypeDuck-HK-schema"
          $schemaPruneList = Join-Path $env:GITHUB_WORKSPACE "TypeDuck-Windows\scripts\typeduck-schema-prune-list.txt"
          $backendRimeRoot = Join-Path $env:GITHUB_WORKSPACE "TypeDuck-Windows-backend\input_methods\rime"
          $schemaDest = Join-Path $backendRimeRoot "data\schema"
          $runtimeBuild = Join-Path $backendRimeRoot "build"
          $rimeDeployer = Join-Path $backendRimeRoot "rime_deployer.exe"

          if (Test-Path -LiteralPath $schemaDest) {
            Remove-Item -LiteralPath $schemaDest -Recurse -Force
          }
          if (Test-Path -LiteralPath $runtimeBuild) {
            Remove-Item -LiteralPath $runtimeBuild -Recurse -Force
          }

          if (-not (Test-Path -LiteralPath $schemaPruneList -PathType Leaf)) {
            throw "Missing TypeDuck schema prune list: $schemaPruneList"
          }
          Get-Content -LiteralPath $schemaPruneList | ForEach-Object {
            $entry = $_.Trim()
            if (-not [string]::IsNullOrWhiteSpace($entry) -and -not $entry.StartsWith("#")) {
              $target = Join-Path $schemaSource $entry
              if (Test-Path -LiteralPath $target) {
                Remove-Item -LiteralPath $target -Recurse -Force
              }
            }
          }

          New-Item -ItemType Directory -Path $schemaDest -Force | Out-Null
          Copy-Item -LiteralPath (Join-Path $schemaSource "*") -Destination $schemaDest -Recurse -Force

          if (-not (Test-Path -LiteralPath $rimeDeployer -PathType Leaf)) {
            throw "Missing Rime deployer: $rimeDeployer"
          }
          & $rimeDeployer --build $backendRimeRoot
          if ($LASTEXITCODE -ne 0) {
            throw "Rime deployer failed with exit code $LASTEXITCODE."
          }
          if (-not (Test-Path -LiteralPath $runtimeBuild -PathType Container)) {
            throw "Rime deployer did not produce runtime build folder: $runtimeBuild"
          }

      - name: Build nightly installer
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\_all_in_package.ps1 `
            -RepoRoot "$env:GITHUB_WORKSPACE\TypeDuck-Windows" `
            -MoqiImeRoot "$env:GITHUB_WORKSPACE\TypeDuck-Windows-backend" `
            -RimeDataSource "$env:GITHUB_WORKSPACE\TypeDuck-HK-schema" `
            -ProtobufRoot "$env:PROTOBUF_ROOT"

      - name: Prepare installer asset name
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        run: |
          $assetName = "typeduck-windows-ime-setup-${{ github.event.release.tag_name || github.sha }}.exe"
          $sourceAsset = Join-Path $PWD "installer\dist\typeduck-windows-ime-setup.exe"
          $assetPath = Join-Path $PWD ("installer\dist\" + $assetName)
          if (-not (Test-Path -LiteralPath $sourceAsset -PathType Leaf)) {
            throw "Missing installer asset: $sourceAsset"
          }
          Copy-Item -LiteralPath $sourceAsset -Destination $assetPath -Force
          "TYPEDUCK_INSTALLER_ASSET=$assetName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: typeduck-windows-ime-nightly-${{ github.sha }}
          path: ${{ github.workspace }}/TypeDuck-Windows/installer/dist/${{ env.TYPEDUCK_INSTALLER_ASSET }}
          if-no-files-found: error

      - name: Publish nightly release
        working-directory: ${{ github.workspace }}/TypeDuck-Windows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "nightly"
          $assetPath = Join-Path $PWD ("installer\dist\" + $env:TYPEDUCK_INSTALLER_ASSET)
          $notesPath = Join-Path $env:RUNNER_TEMP "nightly-notes.md"
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"

          @(
            "Automated nightly build from `main`."
            ""
            "Commit: $env:GITHUB_SHA"
            "Run: $runUrl"
          ) | Set-Content -LiteralPath $notesPath -Encoding utf8

          git tag --force $tag $env:GITHUB_SHA
          git push origin "refs/tags/$tag" --force

          $releaseListJson = gh release list --limit 100 --json tagName
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to query existing releases."
          }
          $releaseList = $releaseListJson | ConvertFrom-Json
          $existingTag = $releaseList | Where-Object { $_.tagName -eq $tag } | Select-Object -ExpandProperty tagName -First 1

          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            gh release upload $tag $assetPath --clobber
            gh release edit $tag --title "Nightly" --notes-file $notesPath
          }
          else {
            gh release create $tag $assetPath --title "Nightly" --notes-file $notesPath --prerelease
          }
